<!DOCTYPE html>
<html>
<head>
<title>RoadWise Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(120deg,#141e30,#243b55);
color:white;
}

.container{
background:rgba(255,255,255,0.07);
padding:40px;
border-radius:18px;
width:350px;
text-align:center;
box-shadow:0 0 25px rgba(0,0,0,0.5);
}

h1{
margin-bottom:25px;
color:#00ffd5;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
outline:none;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
background:linear-gradient(45deg,#00ffd5,#00aaff);
color:black;
font-weight:600;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

.footer{
margin-top:15px;
font-size:13px;
opacity:.7;
}

</style>
</head>

<body>

<div class="container">
<h1>RoadWise Admin</h1>

<form action="login.php" method="POST">
<input type="text" name="username" placeholder="Admin Username" required>
<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>
</form>

<div class="footer">
Secure Admin Access
</div>
</div>

</body>
</html>
